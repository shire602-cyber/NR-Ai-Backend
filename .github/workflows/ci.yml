name: CI

on:
  push:
    branches: [main, refactor/platform-overhaul]
  pull_request:
    branches: [main, refactor/platform-overhaul]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          SESSION_SECRET: ci_session_secret_that_is_long_enough_for_validation
        run: npm test

      - name: Build (client + server)
        env:
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          SESSION_SECRET: ci_session_secret_that_is_long_enough_for_validation
        run: npm run build
