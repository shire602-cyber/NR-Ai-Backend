version: '3.8'

services:
  app:
    build: .
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: muhasib_db
      POSTGRES_USER: ${DB_USER:-muhasib}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muhasib_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-muhasib} -d muhasib_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
